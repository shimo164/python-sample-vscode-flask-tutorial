trigger:
  - main

pool:
  vmImage: ubuntu-latest

variables:
  azureSubscription: 'azure-main-flask-handon-20260614'
  webAppName: 'flask-hands-on-fmwjfjaz5nhek'
  resourceGroupName: 'rg-flask-hands-on'

strategy:
  matrix:
    Python311:
      python.version: '3.11'

steps:
  - task: UsePythonVersion@0
    inputs:
      versionSpec: '$(python.version)'
    displayName: 'Use Python $(python.version)'

  - script: |
      python -m pip install --upgrade pip
      pip install -r requirements.txt
    displayName: 'Install dependencies on build agent'

  - script: |
      pip install pytest pytest-azurepipelines
      pytest
    displayName: 'pytest'

  - task: AzureCLI@2
    displayName: 'Configure App Service'
    inputs:
      azureSubscription: '$(azureSubscription)'
      scriptType: bash
      scriptLocation: inlineScript
      inlineScript: |
        az webapp config appsettings set \
          -g $(resourceGroupName) \
          -n $(webAppName) \
          --settings SCM_DO_BUILD_DURING_DEPLOYMENT=1

        az webapp config set \
          -g $(resourceGroupName) \
          -n $(webAppName) \
          --startup-file "gunicorn --bind=0.0.0.0 --timeout 600 app:app"

  - task: ArchiveFiles@2
    inputs:
      rootFolderOrFile: '$(System.DefaultWorkingDirectory)'
      includeRootFolder: false
      archiveType: 'zip'
      archiveFile: '$(Build.ArtifactStagingDirectory)/app.zip'
      replaceExistingArchive: true
    displayName: 'Archive app'

  - task: AzureCLI@2
    displayName: 'Diagnose App Service deploy target'
    inputs:
      azureSubscription: '$(azureSubscription)'
      scriptType: bash
      scriptLocation: inlineScript
      inlineScript: |
        echo "=== webapp state ==="
        az webapp show \
          -g rg-flask-hands-on \
          -n flask-hands-on-fmwjfjaz5nhek \
          --query "{state:state, enabled:enabled, availabilityState:availabilityState, publicNetworkAccess:publicNetworkAccess, defaultHostName:defaultHostName}" \
          -o table

        echo "=== app service plan ==="
        az appservice plan show \
          -g rg-flask-hands-on \
          -n flask-hands-on-fmwjfjaz5nhek-plan \
          --query "{name:name, tier:sku.tier, sku:sku.name, location:location}" \
          -o table

        echo "=== quotas ==="
        az webapp list-usages \
          -g rg-flask-hands-on \
          -n flask-hands-on-fmwjfjaz5nhek \
          -o table

        echo "=== SCM basic auth policy ==="
        az resource show \
          --resource-group rg-flask-hands-on \
          --namespace Microsoft.Web \
          --resource-type basicPublishingCredentialsPolicies \
          --parent sites/flask-hands-on-fmwjfjaz5nhek \
          --name scm \
          --query "{scmBasicAuthAllowed:properties.allow}" \
          -o table

        echo "=== access restrictions ==="
        az webapp config access-restriction show \
          -g rg-flask-hands-on \
          -n flask-hands-on-fmwjfjaz5nhek \
          -o table

  - task: AzureWebApp@1
    inputs:
      azureSubscription: '$(azureSubscription)'
      appType: 'webAppLinux'
      appName: '$(webAppName)'
      package: '$(Build.ArtifactStagingDirectory)/app.zip'
    displayName: 'Deploy to Azure App Service'
