trigger:
  - main

pool:
  vmImage: ubuntu-latest

variables:
  azureSubscription: 'azure-main-flask-handon-20260614'
  webAppName: 'flask-hands-on-fmwjfjaz5nhek'

strategy:
  matrix:
    Python311:
      python.version: '3.11'

steps:
  - task: UsePythonVersion@0
    inputs:
      versionSpec: '$(python.version)'
    displayName: 'Use Python $(python.version)'

  - script: |
      python -m pip install --upgrade pip
      pip install -r requirements.txt
    displayName: 'Install dependencies'

  - script: |
      pip install pytest pytest-azurepipelines
      pytest
    displayName: 'pytest'

  - task: ArchiveFiles@2
    inputs:
      rootFolderOrFile: '$(System.DefaultWorkingDirectory)'
      includeRootFolder: false
      archiveType: 'zip'
      archiveFile: '$(Build.ArtifactStagingDirectory)/app.zip'
      replaceExistingArchive: true
    displayName: 'Archive app'

  - task: AzureCLI@2
    displayName: 'Check Azure connection'
    inputs:
      azureSubscription: '$(azureSubscription)'
      scriptType: bash
      scriptLocation: inlineScript
      inlineScript: |
        echo "=== az account show ==="
        az account show --query "{name:name, subscriptionId:id, tenantId:tenantId}" -o table

        echo "=== resource group ==="
        az group show -n rg-flask-hands-on --query "{name:name, location:location}" -o table

        echo "=== web app ==="
        az webapp show \
          -g rg-flask-hands-on \
          -n $(webAppName) \
          --query "{name:name, resourceGroup:resourceGroup, location:location, state:state}" \
          -o table

  - task: AzureWebApp@1
    inputs:
      azureSubscription: '$(azureSubscription)'
      appType: 'webAppLinux'
      appName: '$(webAppName)'
      package: '$(Build.ArtifactStagingDirectory)/app.zip'
    displayName: 'Deploy to Azure App Service'
